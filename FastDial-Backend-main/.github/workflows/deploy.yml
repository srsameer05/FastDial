name: Build and Push Backend

on:
  push:
    branches: [master]

jobs:
  build-backend:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_PASSWORD }}

    - name: Build and Push Backend Docker Image
      run: |
        docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/fast-dial-backend:v11 ./backend
        docker push ${{ secrets.DOCKER_HUB_USERNAME }}/fast-dial-backend:v11

    - name: Trigger Frontend Deployment
      uses: peter-evans/repository-dispatch@v3
      with:
        token: ${{ secrets.FRONTEND_TRIGGER_TOKEN }}
        repository: naveengowda007/Fast-Dial
        event-type: trigger-frontend-deploy
