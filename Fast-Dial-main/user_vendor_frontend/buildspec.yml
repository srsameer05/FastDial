version: 0.2

phases:
  install:
    commands:
      - npm install
  build:
    commands:
      - npm run build
      - docker build -t fast-dial-frontend .
      - docker tag fast-dial-frontend:latest 890742591137.dkr.ecr.us-east-1.amazonaws.com/fast-dial-frontend:latest
  post_build:
    commands:
      - aws ecr get-login-password --region <region> | docker login --username AWS --password-stdin 890742591137.dkr.ecr.us-east-1.amazonaws.com
      - docker push 890742591137.dkr.ecr.us-east-1.amazonaws.com/fast-dial-frontend:latest
