server {
    listen 80;
    server_name fastdial.in quickserve.info;

    location /.well-known/acme-challenge/ {
    alias /var/www/certbot/.well-known/acme-challenge/;
    try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name fastdial.in;

    ssl_certificate /etc/letsencrypt/live/fastdial.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fastdial.in/privkey.pem;

    location / {
        proxy_pass http://fast-dial-admin:80;
    }

    location /api/ {
        proxy_pass http://fast-dial-backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /socket.io/ {
        proxy_pass http://fast-dial-backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }
}

server {
    listen 443 ssl;
    server_name quickserve.info;

    ssl_certificate /etc/letsencrypt/live/quickserve.info/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/quickserve.info/privkey.pem;

    location / {
        proxy_pass http://fast-dial-frontend:80;
    }

    location /api/ {
        proxy_pass http://fast-dial-backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /socket.io/ {
        proxy_pass http://fast-dial-backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }
}
