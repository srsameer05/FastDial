version: '3.7'

services:
  user-vendor-frontend:
    image: flutterflirtcom/fast-dial-frontend:latest
    container_name: fast-dial-frontend
    restart: always
    volumes:
      - ./user_vendor_frontend/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - fast-dial

  admin-frontend:
    image: flutterflirtcom/fast-dial-admin:latest
    container_name: fast-dial-admin
    restart: always
    ports:
      - "8081:80"
    volumes:
      - ./admin_frontend/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - fast-dial

  backend:
    image: flutterflirtcom/fast-dial-backend:v11
    container_name: fast-dial-backend
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    networks:
      - fast-dial

  reverse-proxy:
    image: nginx:latest
    container_name: fast-dial-reverse-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./reverse-proxy/nginx-proxy.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt/live:/etc/letsencrypt/live:ro
      - /etc/letsencrypt/archive:/etc/letsencrypt/archive:ro
      - /etc/letsencrypt/renewal:/etc/letsencrypt/renewal:ro
      - /var/www/certbot:/var/www/certbot
    depends_on:
      - admin-frontend
      - user-vendor-frontend
      - backend
    networks:
      - fast-dial

networks:
  fast-dial:
    driver: bridge
