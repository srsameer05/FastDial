name: Build and Deploy Frontend

on:
  push:
    branches: [master]
  repository_dispatch:
    types: [trigger-frontend-deploy]

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_PASSWORD }}

    - name: Build and Push Admin Frontend
      run: |
        docker build \
          -t ${{ secrets.DOCKER_HUB_USERNAME }}/fast-dial-admin:latest \
          ./admin_frontend
        docker push ${{ secrets.DOCKER_HUB_USERNAME }}/fast-dial-admin:latest

    - name: Build and Push User/Vendor Frontend
      run: |
        docker build \
          -t ${{ secrets.DOCKER_HUB_USERNAME }}/fast-dial-frontend:latest \
          ./user_vendor_frontend
        docker push ${{ secrets.DOCKER_HUB_USERNAME }}/fast-dial-frontend:latest

    - name: SSH into EC2 and Deploy with Docker Compose
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
        script: |
          cd /home/ubuntu/Fast-Dial

          echo "Writing backend .env file..."
          mkdir -p backend
          echo "${{ secrets.BACKEND_ENV_FILE }}" > backend/.env

          echo "Writing frontend .env files..."
          echo "VITE_API_URL=${{ secrets.VITE_API_URL_ADMIN }}" > ./admin_frontend/.env
          echo "VITE_API_URL=${{ secrets.VITE_API_URL_USER }}" > ./user_vendor_frontend/.env

          echo "Pulling latest Docker images..."
          docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/fast-dial-backend:v11
          docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/fast-dial-admin:latest
          docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/fast-dial-frontend:latest

          echo "Stopping any containers using key ports..."
          CONTAINERS=$(docker ps --filter "publish=80" --filter "publish=3000" --filter "publish=8081" -q)
          if [ ! -z "$CONTAINERS" ]; then
            docker stop $CONTAINERS
            docker rm $CONTAINERS
          fi

          echo "Pruning unused Docker resources..."
          docker system prune -f
          
          echo "Deploying with Docker Compose..."
          docker-compose down
          docker compose up -d --remove-orphans
